name: Build EXE for Low-End PC Project

on: [push] # سيعمل تلقائياً عند كل رفع للكود

jobs:
  build:
    runs-on: windows-latest # سنستخدم ويندوز قوي من سيرفرات جيت هاب لعمل التجميع

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install pyinstaller watchdog

    - name: Build EXE
      run: |
        # أمر التجميع الذي ناقشناه سابقاً
        pyinstaller --noconfirm --onefile --windowed --name "SmartLibTerminal" main.py

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: SmartLibTerminal-EXE # غيرنا الاسم هنا لتجنب التضارب
        path: dist/SmartLibTerminal.exe
